bind-address: '*'
mode: rule
log-level: info
ipv6: true
prefer-ipv6: true
external-controller: '127.0.0.1:9090'
find-process-mode: strict
unified-delay: true
tcp-concurrent: true
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
