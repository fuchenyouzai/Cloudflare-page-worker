    type: url-test  # 策略组分组类型 url-test自动选择/fallback故障转移切换下一个/load-balance负载均衡/select手动选择/reject拒绝等类型/REJECT-DROP拒绝，与`REJECT`不同的是，该策略将静默抛弃请求/PASS绕过，会使匹配规则时跳过此规则/COMPATIBLE兼容，在策略组筛选不出节点时出现，等效 DIRECT
    include-all: true # 显示全部类型的所有节点 包括Proxies代理和订阅Provider的use订阅链接节点
    # include-all-proxies: true明确包含所Proxies有代理节点
    # include-all-providers: true明确包含所有Provider订阅use
    exclude-type: direct # 显示全部节点
    # lazy: true 按需检测（悠哉定义：true表示仅当该分组有流量时才发起延迟测试，false表示启动客户端即全量测试，true更节省网络资源）懒惰状态，默认为`true`,未选择到当前策略组时，不进行测试
    interval: 3600     # 检查间隔：3600为一小时。600秒 (10分钟) 自动检测一次节点质量
    tolerance: 100   # 容差30
    # timeout: 5000超时时间：请求等待 5000毫秒 (5秒)，超时即判定为节点失败
    # max-failed-times: 5最大失败次数，超过则触发一次强制健康检查，默认 5
    # expected-status: 204健康检查时期望的 HTTP 响应状态码。若配置了该字段，则只有当响应状态码与期望状态一致时才认为节点可用。默认为 `*`，表示对响应状态不做要求。。可使用 `/` 匹配多个状态码，使用 `-` 匹配状态范围，可混合书写。。示例 匹配 200 和 302 状态码expected-status: 200/302。。。匹配 400 到 503 状态码。。。匹配 200 和 302 以及 400 到 503 状态码。expected-status: 200/302/400-503
    # disable-udp: true禁用 UDP：该组所有节点不转发 UDP 流量 (适合不支持 BBR 或 UDP 不稳定的节点)
    # interface-name: en0 看到最后 指定策略组的出站接口。优先级: 代理节点 > 代理策略 > 全局。绑定网络接口：强制通过 en0 网卡（通常是 Wi-Fi / 有线主网卡）发出请求？。。。代理组中的 interface-name 已弃用，请使用代理节点中的interface-name
    # routing-mark: 11451看到最后 路由标记：Linux 系统下设置防火墙标记 11451，配合系统路由表实现策略路由。。。代理组中的 routing-mark 已弃用，请使用代理节点中的routing-mark。策略组出站时附带路由标记，优先级: 代理节点 > 代理策略 > 全局
    # 只会检查代理组的 proxies 字段的代理，不会检查代理集合（proxy-providers）的代理（通过 use 引入的）。
    url: https://www.gstatic.com/generate_204  # 健康检查URL：测试节点是否连通的地址 (Google 204 空页面)
    # 悠哉正则过滤器 筛选满足关键词或正则表达式：(?i)是不区分大小写。只保留名字中包含这些关键词的节点。。。。可以使用 ` 反引号，区分多个正则表达式
    filter: "(?i)(sea|sjc|美国|United States|US|🇺🇸|america|America|洛杉矶|西雅图|圣何塞|纽约|unitedstates|united states)"
