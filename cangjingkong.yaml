# ===  🔧  核心运行与性能 ====================

mode: rule
# 流量运行模式：
# rule = 按规则分流（走代理、直连或拒绝，按规则判断）
# global = 全局代理（全部走代理）
# direct = 全局直连（全部不走代理）
# 当前：rule（精细化控制模式）

log-level: info
# 日志等级：
# debug：详细日志
# info：正常运行日志
# warning：只警告
# error：只报错
# silent：无日志
# 当前：info（日常最稳妥）

unified-delay: true
# 统一延迟计算方式
# 让不同协议不同节点的延迟数据可比可信。

tcp-concurrent: true
# 开启 TCP 并发连接，会同时建立多条连接，
# 挑出最快的那条，显著提升多任务场景速度（下载、多页面访问等）。

# === 🔐 网络协议与安全伪装 ====================


ipv6: true
# 开启 IPv6 支持，能使用 IPv6 网络解析与访问。
# true = 开启
# false = 关闭

# === 🧠 进程与局域网控制 ====================

find-process-mode: always
# 强制识别所有流量来自哪个应用进程，方便精准控制进程分流。
# always（强制匹配）
# strict（智能判断）
# off（不匹配）

allow-lan: true
# 允许局域网其他设备（手机、平板、电脑等）通过你的代理上网。
# true = 局域网设备可使用你的代理服务
# false = 拒绝局域网访问


# === 👂🏻 基础监听与端口配置 =================

bind-address: "*"
# 监听地址：控制代理服务对外暴露的 IP
# 可选：* (监听所有网卡/IP) 
# 当前：* (监听所有，确保局域网/外网都能接入)

redir-port: 7892
# 透明代理端口 (Redir)：用于 Linux/Mac 系统的透明流量转发

tproxy-port: 7893
# TProxy 透明代理端口：Linux 下的高级透明代理模式
# 支持 TCP/UDP，能还原真实源 IP，分流最精准

port: 9521
# HTTP 代理端口：专门处理 HTTP 协议的代理端口
# 浏览器、部分 App 可直接配置此端口使用

socks-port: 9125
# SOCKS5 代理端口：通用代理协议，支持 TCP 和 UDP
# 游戏、终端工具、部分 App 常用此协议

mixed-port: 9527
# 混合代理端口：HTTP + SOCKS5 二合一端口
# 一个端口同时支持两种协议，方便软件接入，无需区分

# === 🌏 局域网访问控制 =================


lan-allowed-ips:
# 局域网白名单：允许哪些 IP 段的设备可以连接代理
# 格式：CIDR 网段
# 当前：默认允许所有 (0.0.0.0/0 代表所有 IPv4，::/0 代表所有 IPv6)
  - "0.0.0.0/0"
  - "::/0"

lan-disallowed-ips:
# 局域网黑名单：禁止哪些 IP 段的设备连接代理 (优先级高于白名单)
# 格式：CIDR 网段
# 当前：禁止单个 IP (192.168.0.100这台设备不能用)
  - "192.168.0.100/32"

# === ⚠️ 安全认证 =================

authentication:
# 代理端口认证：给 HTTP/SOCKS/Mixed 端口加密码保护
# 防止未授权设备滥用代理，保障安全
# 格式：用户名:密码
# 当前：用户名 youzai，密码 TGfuchenyouzaibot
  - "youzai:TGfuchenyouzaibot"

skip-auth-prefixes:
# 免验证白名单：内网/本机 IP 接入时，无需输入账号密码
# 配置可信内网段，避免内部设备反复验证
# 当前：已包含常用内网、本机、链路本地地址
  - "::1/128"      # IPv6 本机回环 (类似 127.0.0.1)
  - "fc00::/7"     # IPv6 内网唯一本地地址
  - "fd00::/8"     # IPv6 私有网段
  - "fe80::/10"    # IPv6 链路本地地址
  - "10.0.0.0/8"   # 内网私有网段 A
  - "100.64.0.0/10" # 运营商级 NAT 网段
  - "127.0.0.0/8"  # IPv4 本机回环
  - "172.16.0.0/12"# 内网私有网段 B
  - "192.168.0.0/16"# 家庭/内网私有网段 C
  - "198.18.0.0/16"# 网络测试保留网段
  - "224.0.0.0/4"  # IPv4 组播地址段





# TCP Keep Alive 包发送间隔：每15秒发送一次保活探测包
# 作用：维持TCP连接活跃，避免被路由/防火墙断开；间隔越小连接越稳，耗电越高，移动设备建议15-30秒

keep-alive-interval: 15
# TCP Keep Alive 最大空闲时间：连接空闲15秒后开始发送保活包
# 作用：仅空闲超阈值才触发保活，减少无效探测，降低耗电；与interval配合，空闲久才保活

keep-alive-idle: 15
# 禁用 TCP Keep Alive：false（开启），Android系统强制为true（禁用）
# 作用：Android禁用后完全不发保活包，大幅省电，但可能导致空闲连接被断开；非Android设备保持false兼顾稳定

disable-keep-alive: true




# 写入需要权限
ntp:
  enable: true                         # 开启 NTP 网络时间同步功能
  write-to-system: false        # true为修改  将同步后的时间写入系统（校准系统时间）
  server: ntp.ntsc.ac.cn        # 国家授时中心 备用cn.ntp.org.cn  time.apple.com   NTP 时间服务器地址（苹果官方时间服务器）
  port: 123                             # NTP 协议默认端口（固定 123）
  interval: 30                        # 同步间隔：每 30 分钟校准一次时间





