    # exclude-type: "Shadowsocks|Http"排除类型剔除协议类型为 Shadowsocks 或 Http 的节点 (即使名字符合也会被排除) 。。。不支持正则表达式，通过 `|` 分割，根据节点类型排除，仅排除[引入出站代理](#proxies)无视大小写
