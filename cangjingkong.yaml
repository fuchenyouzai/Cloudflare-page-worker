# ===🚪 端口转发（Tunnels）配置
 
# 作用：在本地开启端口，转发到远程服务器端口并指定代理/直连，适用于 DNS 转发、数据库代理、游戏端口转发 等场景。
tunnels:
  # 示例 1：TCP+UDP 转发（DNS 代理）
  # - "tcp/udp,127.0.0.1:6553,114.114.114.114:53,DIRECT"
  # 用途：本地 6553 端口 → 114.114.114.114:53（DNS），走直连
  # 用法：程序连 127.0.0.1:6553 做 DNS，即走此转发
  # 格式说明：协议,本地地址:端口,目标地址:端口,代理/DIRECT

  # 示例 2：TCP 转发（MySQL 数据库）
  # - "tcp,127.0.0.1:6666,rds.mysql.com:3306,DIRECT"
  # 用途：本地 6666 端口 → 远程 MySQL 3306 端口，走直连
  # 用法：程序连 127.0.0.1:6666 即连远程数据库

  # 示例 3：多行完整配置（推荐，更清晰）
  # - network: ["tcp", "udp"]
  #   address: "127.0.0.1:7777"
  #   target: "target.com:8080"
  #   proxy: "PROXY_GROUP"
  # 用途：本地 7777 端口 → 远程 target.com:8080，走指定代理组
  # 可选值：
  #   network: ["tcp"] / ["udp"] / ["tcp", "udp"]
  #   address: 本地监听地址:端口（如 127.0.0.1:端口 仅本地访问，0.0.0.0:端口 外网访问）
  #   target: 远程目标地址:端口
  #   proxy: 代理组名 / "DIRECT"（直连）





