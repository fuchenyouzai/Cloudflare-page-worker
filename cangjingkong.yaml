# === Tun 虚拟网口设置 ====================

# 系统级虚拟网卡，接管全局流量，实现无需手动配置的全局代理
tun:
  # ========== 一、基础核心配置 ==========
  enable: true
  # 用途：TUN 总开关
  # 可选值：true / false
  # 用法：true=接管系统全部流量（全局代理）；false=关闭 TUN
  # 注意：开启后所有流量自动走代理规则

  stack: "mixed"
  # 用途：网络栈类型，决定性能与兼容性
  # 可选值：
  #   system  = 系统内核栈（性能最好、最稳定，日常推荐）
  #   gvisor  = 用户态栈（兼容性最强，适合游戏、UDP、特殊软件）
  #   mixed   = 混合栈（TCP用system、UDP用gvisor，兼顾性能与兼容）

  mtu: 1420
  # 用途：最大传输单元
  # 建议范围：1400–1500
  # 注意：过大易丢包，过小降速

  # ========== 二、DNS 防泄漏配置 ==========
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  # 用途：强制劫持所有 DNS 请求，防止 DNS 泄露
  # 说明：劫持 UDP/TCP 53 端口，确保 DNS 走代理

  # ========== 三、自动路由与网卡适配 ==========
  auto-detect-interface: true
  # 用途：自动检测当前网卡
  # 用法：true=自动适配 WiFi/有线切换，无需手动配置

  auto-route: true
  # 用途：自动配置系统路由
  # 用法：true=自动管理流量转发，无需手动改路由表

  auto-redirect: true
  # 用途：Linux 专用，自动配置 iptables 重定向 TCP
  # 用法：true=路由器环境正常工作；false=关闭

  # ========== 四、Linux 高级优化（默认注释禁用） ==========
  # gso: false
  # 用途：Linux 专用，通用分段卸载，提升大流量吞吐

  # gso-max-size: 65536
  # 用途：GSO 最大包大小，配合 gso 使用

  # strict-route: true
  # 用途：强制所有流量走 TUN
  # 注意：开启会导致局域网设备无法互通，非纯净需求禁用

  # disable-icmp-forwarding: true
  # 用途：禁用 ICMP 转发
  # 注意：开启会导致 ping 延迟不准，不建议启用

  # ========== 五、路由规则集（Linux + nftables 专用） ==========
  route-address-set:
    - "ruleset-1"
    - "ruleset-2"
  # 用途：强制走代理的规则集
  # 说明：匹配的 IP 走 TUN；不匹配直连

  route-exclude-address-set:
    - "ruleset-3"
    - "ruleset-4"
  # 用途：直连不走代理的规则集
  # 说明：匹配的 IP 绕过 TUN，用于局域网互通

  # ========== 六、手动自定义路由 ==========
  route-address:
    - "0.0.0.0/1"
    - "128.0.0.0/1"
    - "::/1"
    - "8000::/1"
  # 用途：手动指定全局路由网段，覆盖全部 IPv4+IPv6
  # 说明：替代自动路由，实现完整接管

# ========== 七、旧版/高级/Android 限制（全部注释，按需启用） ==========
## ① 旧版路由（已废弃，不推荐）
