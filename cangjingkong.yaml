# === 🔍 流量嗅探（Sniffer）核心配置 ====================

# 作用：自动解析 IP 流量为真实域名
# 解决 DNS 污染、纯 IP 分流不准、APP 抓不到域名 问题，
# 让分流按真实域名走，更精准。

sniffer:
  # ========== 基础核心开关 ==========
  enable: true
  # 用途：总开关，启用流量嗅探功能
  # 可选值：true / false
  # 用法：true=开启（推荐），false=关闭所有嗅探功能

  # ========== 强制嗅探策略 ==========
  force-dns-mapping: true
  # 用途：强制对 redir-host 模式（Tun/Redir/TProxy）的流量进行嗅探，覆盖 Mapping 表
  # 为什么用：透明代理下只能拿到 IP，靠 Mapping 猜域名易不准；强制嗅探用 TLS/HTTP 真实域名分流
  # 可选值：true / false
  # 注意事项：必开！解决 DNS 污染、分流不准；关闭会导致 IP 分流错误

  parse-pure-IP: true
  # 用途：对只有 IP、无域名的流量强制嗅探，还原真实域名
  # 为什么用：很多 APP 只发 IP 请求，嗅探后才能按域名分流
  # 可选值：true / false
  # 注意事项：日常推荐 true；玩游戏/内网直连时可关，避免误判或轻微延迟

  override-destination: false
  # 用途：用嗅探到的真实域名，强制覆盖原目标 IP
  # 为什么用：分流100%按真实域名走，彻底防 DNS 污染
  # 可选值：true / false
  # 注意事项：推荐 true；玩游戏/内网设备访问时关，避免连接异常或破坏直连

  # ========== 协议嗅探精细配置 ==========
  sniff:
    # QUIC 协议（HTTP/3，用于高速传输/部分 APP）
    QUIC:
      ports: [443, 8443]
      # 用途：指定嗅探 QUIC 协议的端口
      # 可选值：端口号/端口范围（数组）
      # 说明：QUIC 常用 443/8443 端口，与 TLS 一致

    # TLS 协议（HTTPS 加密流量，主流网站/APP）
    TLS:
      ports: [443, 8443]
      # 用途：指定嗅探 TLS 加密流量的端口
      # 可选值：端口号/端口范围（数组）
      # 说明：覆盖 99% 加密网站/APP 流量，必配

    # HTTP 协议（未加密流量）
    HTTP:
      ports: [80, 8080-8880]
      # 用途：指定嗅探 HTTP 未加密流量的端口
      # 可选值：端口号/端口范围（数组）
      # 说明：80 为 HTTP 默认端口，8080-8880 覆盖常见代理/服务端口
      override-destination: true
      # 用途：HTTP 流量强制用真实域名覆盖目标
      # 可选值：true / false
      # 说明：HTTP 明文流量必开，确保分流精准

  # ========== 强制嗅探域名列表（高污染/纯 IP 场景） ==========
  force-domain:
    - "+.v2ex.com"          # 用途：V2EX 高 DNS 污染，强制嗅探保稳定
    - "+.twitter.com"       # 用途：推特流量，纯 IP 多，强制嗅探
    - "+.youtube.com"       # 用途：YouTube 视频/API，纯 IP 多，强制嗅探
    - "+.github.com"        # 用途：GitHub 高污染，强制嗅探保访问
    - "+.google.com"        # 用途：谷歌核心服务，防污染/纯 IP 分流
    - "+.googlevideo.com"   # 用途：YouTube 视频流，纯 IP 多，强制嗅探
    - "+.googleapis.cn"     # 用途：谷歌 API 服务，精准分流
    - "+.facebook.com"      # 用途：脸书流量，强制嗅探防污染
    - "+.githubassets.com"  # 用途：GitHub 静态资源，纯 IP 多，强制嗅探
    - "+.cloudflare.com"    # 用途：Cloudflare 服务，高可用/纯 IP 分流
    - "+.cloudflare-dns.com"# 用途：Cloudflare DNS，强制嗅探保解析
    - "+.googleadservices.com" # 用途：谷歌广告服务，精准分流
    - "+.googlesyndication.com" # 用途：谷歌广告网络，强制嗅探
    - "+.doubleclick.net"   # 用途：谷歌广告组件，纯 IP 多，强制嗅探
    - "+.ads.youtube.com"   # 用途：YouTube 广告，强制嗅探
    - "+.adservice.google.com" # 用途：谷歌广告服务，精准分流
  # 用法说明："+.域名" = 匹配该域名及所有子域名，强制嗅探不按 IP 分流

  # ========== 嗅探跳过规则（来源/目标/域名） ==========
  # 作用：避免嗅探内网/本地流量，保证内网设备/服务正常访问，不被干扰

  # 跳过来源 IP 嗅探（流量从这些 IP 来，不嗅探）
  skip-src-address:
    - "192.168.0.3/32"    # 用途：指定内网设备（如 NAS/游戏机）流量不嗅探
    - "0.0.0.0/8"         # 用途：保留地址段，不嗅探
    - "10.0.0.0/8"        # 用途：内网私有地址段，不嗅探
    - "100.64.0.0/10"     # 用途：运营商内网地址段，不嗅探
    - "127.0.0.0/8"       # 用途：本地回环地址，不嗅探
    - "169.254.0.0/16"    # 用途：自动分配内网地址，不嗅探
    - "172.16.0.0/12"     # 用途：内网私有地址段，不嗅探
    - "192.168.0.0/16"    # 用途：常用内网地址段，不嗅探
    - "192.0.0.0/24"      # 用途：保留地址段，不嗅探
    - "192.0.2.0/24"      # 用途：测试地址段，不嗅探
    - "198.18.0.0/15"     # 用途：保留测试地址段，不嗅探
    - "198.51.100.0/24"   # 用途：保留地址段，不嗅探
    - "203.0.113.0/24"    # 用途：测试地址段，不嗅探
    - "224.0.0.0/4"       # 用途：组播地址段，不嗅探
    - "240.0.0.0/4"       # 用途：保留地址段，不嗅探
    - "::1/128"           # 用途：IPv6 本地回环，不嗅探
    - "fc00::/7"          # 用途：IPv6 内网地址段，不嗅探
    - "fd00::/8"          # 用途：IPv6 私有地址段，不嗅探
    - "fe80::/10"         # 用途：IPv6 链路本地地址，不嗅探
    - "192.168.3.1/32"    # 用途：内网设备 IP，不嗅探
    - "192.168.1.1/32"    # 用途：路由器网关 IP，不嗅探
    - "10.0.0.1/32"       # 用途：内网网关 IP，不嗅探
    - "fe80::5221:ecff:fe8d:1b27/128" # 用途：IPv6 内网设备，不嗅探

  # 跳过目标 IP 嗅探（访问这些 IP，不嗅探）
  skip-dst-address:
    - "192.168.0.3/32"    # 用途：访问内网设备（如打印机/NAS）不嗅探
    - "0.0.0.0/8"         # 用途：保留地址，不嗅探
    - "10.0.0.0/8"        # 用途：内网地址，不嗅探
    - "100.64.0.0/10"     # 用途：运营商内网，不嗅探
    - "127.0.0.0/8"       # 用途：本地回环，不嗅探
    - "169.254.0.0/16"    # 用途：自动分配内网，不嗅探
